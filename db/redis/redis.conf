# ─── Redis Configuration ─────────────────────────────────────
# Faculty Feedback System — Redis 7+

# Network
bind 127.0.0.1
port 6379
protected-mode yes

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence (RDB snapshots)
save 900 1
save 300 10
save 60 10000

# Logging
loglevel notice
logfile ""

# Security (set a password in production)
# requirepass your-redis-password

# Timeout
timeout 300
tcp-keepalive 60
